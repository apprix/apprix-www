name: Cleanup old releases

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 62.238.10.202 >> ~/.ssh/known_hosts

      - name: Write and run cleanup script via www-data
        run: |
          # Write PHP script without leading whitespace issues from YAML heredoc
          printf '%s\n' \
            '<?php' \
            'if (($_GET["token"] ?? "") !== "xK9mP2cleanup") { http_response_code(403); die("forbidden"); }' \
            'foreach ([32,35,37,38,39] as $r) {' \
            '  $g = "/var/www/apprix-www/releases/$r/.git";' \
            '  if (is_dir($g)) shell_exec("rm -rf " . escapeshellarg($g));' \
            '  $d = "/var/www/apprix-www/releases/$r";' \
            '  if (is_dir($d)) shell_exec("rm -rf " . escapeshellarg($d));' \
            '}' \
            'echo "done";' \
          | ssh deploy@62.238.10.202 "cat > /var/www/apprix-www/current/public/cleanup_releases.php"

          # Hit it via HTTP so it runs as www-data (php-fpm)
          curl -sf -u "apprix:Appr1x2026!" \
            "https://www3.apprix.fi/cleanup_releases.php?token=xK9mP2cleanup"

          # Delete the script immediately
          ssh deploy@62.238.10.202 "rm /var/www/apprix-www/current/public/cleanup_releases.php"

      - name: Verify releases
        run: |
          ssh deploy@62.238.10.202 "ls /var/www/apprix-www/releases/"
