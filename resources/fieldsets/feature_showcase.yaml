title: Feature showcase
fields:
  - handle: eyebrow
    field:
      type: text
      localizable: true
      display: Eyebrow
      instructions: "Short label above the section title."

  - handle: title
    field:
      type: text
      localizable: true
      required: true
      display: Title

  - handle: lead
    field:
      type: textarea
      localizable: true
      display: Lead text
      instructions: "Short supporting text (1–2 lines)."
      rows: 2

  - handle: autoplay
    field:
      type: toggle
      display: Auto-rotate tabs
      default: true

  - handle: autoplay_interval
    field:
      type: integer
      display: Rotation interval (seconds)
      default: 6
      instructions: "Seconds between auto-rotation. Ignored if auto-rotate is off."

  - handle: features
    field:
      type: replicator
      localizable: true
      display: Features
      instructions: "Add 2–5 feature tabs."
      button_label: "Add feature"
      sets:
        feature:
          display: Feature
          icon: layout-dashboard
          fields:
            - handle: tab_label
              field:
                type: text
                localizable: true
                required: true
                display: Tab label
                instructions: "Short label shown on the tab button."

            - handle: icon
              field:
                type: select
                display: Icon
                default: pencil
                options:
                  pencil: Pencil (content/creation)
                  target: Target (reach/goals)
                  plug: Plug (integrations)
                  chart: Chart (analytics/data)
                  shield: Shield (security)
                  users: Users (people/teams)
                  clipboard: Clipboard (checklists)
                  award: Award (exams/certification)
                  sparkles: Sparkles (AI/content services)

            - handle: eyebrow
              field:
                type: text
                localizable: true
                display: Eyebrow
                instructions: "Short category label above the title."

            - handle: title
              field:
                type: text
                localizable: true
                required: true
                display: Title

            - handle: text
              field:
                type: textarea
                localizable: true
                display: Description
                rows: 3

            - handle: bullets
              field:
                type: list
                localizable: true
                display: Key points
                instructions: "1–4 short bullets."

            - handle: image
              field:
                type: assets
                container: files
                max_files: 1

            - handle: buttons
              field:
                type: grid
                localizable: true
                max_rows: 2
                fields:
                  - handle: label
                    field:
                      type: text
                      required: true

                  - handle: link
                    field:
                      type: link
                      required: true

                  - handle: style
                    field:
                      type: select
                      display: Style
                      options:
                        primary: Primary
                        secondary: Secondary
                      default: primary
