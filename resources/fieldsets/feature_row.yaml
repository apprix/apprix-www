title: Feature row
fields:
  -
    handle: section_intro
    field:
      type: group
      localizable: true
      display: Section intro (optional)
      instructions: "Optional heading shown above this feature row. Use this on the first row of a section."
      fields:
        -
          handle: eyebrow
          field:
            type: text
            localizable: true
            display: Section eyebrow
            instructions: "Short label above the section title."
        -
          handle: section_title
          field:
            type: text
            localizable: true
            display: Section title
        -
          handle: lead
          field:
            type: textarea
            localizable: true
            display: Section lead
            instructions: "Keep it short (1–2 lines)."
            rows: 2
            character_limit: 200

  - handle: eyebrow
    field:
      type: text
      localizable: true
      display: Eyebrow
      instructions: "Short label above the title (e.g. 'Keskeinen ominaisuus')"

  - handle: eyebrow_style
    field:
      type: select
      display: Eyebrow style
      options:
        subtle: Subtle label (no pill)
        pill: Pill badge
      default: subtle

  - handle: title
    field:
      type: text
      localizable: true
      required: true
      display: Title

  - handle: text
    field:
      type: textarea
      localizable: true
      instructions: "Keep it short (1–3 lines). Use bullets for details."

  - handle: bullets
    field:
      type: list
      localizable: true
      display: Key points
      instructions: "1–4 short bullets for scanning"

  - handle: image
    field:
      type: assets
      container: files
      max_files: 1

  - handle: image_alt
    field:
      type: text
      localizable: true
      display: Image alt text

  - handle: image_style
    field:
      type: select
      display: Image style
      options:
        card: Card (rounded + shadow)
        plain: Plain image
      default: card

  - handle: tone
    field:
      type: select
      display: Section background
      options:
        white: White
        soft: Soft tinted (recommended)
        dark: Dark (only if image supports it)
      default: soft

  - handle: accent
    field:
      type: select
      display: Accent color
      instructions: "Pick ONE accent per row (keeps it clean)."
      options:
        none: None
        orange: Orange
        blue: Blue
        green: Green
        purple: Purple
      default: none

  - handle: reverse
    field:
      type: toggle
      display: Reverse layout (image right)
      default: false

  - handle: buttons
    field:
      type: grid
      localizable: true
      max_rows: 2
      fields:
        - handle: label
          field:
            type: text
            required: true

        - handle: link
          field:
            type: link
            required: true

        - handle: style
          field:
            type: select
            display: Style
            options:
              primary: Primary
              secondary: Secondary
              text: Text
            default: primary

        - handle: icon
          field:
            type: text
            display: Icon (optional)
            instructions: "Optional: name of icon if you support icons (e.g. 'arrow-right')"
