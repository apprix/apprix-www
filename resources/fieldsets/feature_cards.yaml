title: Feature cards
fields:
  - handle: eyebrow
    field:
      type: text
      display: Eyebrow
      localizable: true

  - handle: title
    field:
      type: text
      display: Title
      localizable: true
      required: true

  - handle: lead
    field:
      type: textarea
      display: Lead
      localizable: true
      rows: 2

  - handle: premium
    field:
      type: toggle
      display: Premium variant
      instructions: "Larger cards without icons, premium visual treatment (landing page)."
      default: false
      width: 50

  - handle: features
    field:
      type: replicator
      localizable: true
      display: Features
      button_label: "Add feature"
      sets:
        feature:
          display: Feature
          icon: layout-grid
          fields:
            - handle: icon
              field:
                type: select
                display: Icon
                options:
                  pencil: Pencil (content)
                  target: Target (reach)
                  plug: Plug (integrations)
                  chart: Chart (analytics)
                  shield: Shield (security)
                  users: Users (collaboration)
                  book: Book (learning)

            - handle: title
              field:
                type: text
                localizable: true
                required: true
                display: Title

            - handle: text
              field:
                type: textarea
                localizable: true
                display: Text
                rows: 2
