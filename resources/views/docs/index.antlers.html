{{#
    @name Docs Index
    @desc Landing page at /help — lists all top-level sections.
#}}

<!-- /docs/index.antlers.html -->

<div class="mb-8 border-b border-neutral-200 pb-8">
    <h1 class="text-2xl font-bold tracking-tight text-neutral-900 md:text-3xl">
        {{ trans:strings.docs_index_title }}
    </h1>
    <p class="mt-3 text-base leading-relaxed text-neutral-500">
        {{ trans:strings.docs_index_intro }}
    </p>
</div>

<div class="grid gap-3 sm:grid-cols-2">
    {{ collection:docs depth="1" }}
        <a
            href="{{ url }}"
            class="group flex items-start gap-4 rounded-xl border border-neutral-200 bg-white p-5 transition hover:border-primary/30 hover:shadow-sm"
        >
            <div class="min-w-0 flex-1">
                <p class="font-semibold text-neutral-800 group-hover:text-primary">
                    {{ title }}
                </p>
                {{ if intro }}
                    <p class="mt-1 text-sm leading-relaxed text-neutral-500 line-clamp-2">
                        {{ intro }}
                    </p>
                {{ /if }}
            </div>
            <span class="mt-0.5 shrink-0 text-neutral-300 transition group-hover:text-primary group-hover:translate-x-0.5">→</span>
        </a>
    {{ /collection:docs }}
</div>

<!-- End: /docs/index.antlers.html -->
