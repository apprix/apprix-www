{{# Renders grandchild sections — called inside the child loop so {{ children }} scopes correctly #}}
{{ children }}
    <section id="{{ slug }}" class="mt-8 scroll-mt-20 ml-4 border-l-2 border-neutral-200 pl-6">

        <h3 class="text-lg font-semibold tracking-tight text-neutral-800">
            {{ title }}
        </h3>

        {{ if content }}
            <div class="prose prose-neutral prose-base max-w-none leading-relaxed mt-3
                prose-headings:scroll-mt-20
                prose-headings:font-semibold
                prose-h3:text-lg prose-h3:mt-8 prose-h3:mb-2
                prose-a:font-medium prose-a:text-primary prose-a:no-underline hover:prose-a:underline
                prose-img:rounded-xl prose-img:shadow-sm
                prose-blockquote:border-l-primary prose-blockquote:not-italic
            ">
                {{ content }}
            </div>
        {{ /if }}

    </section>
{{ /children }}
