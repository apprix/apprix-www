{{#
    @name Search overlay
    @desc Global Ctrl+K command palette for site-wide search.
#}}

<!-- /components/_search.antlers.html -->
<div
    x-data="{
        open: false,
        query: '',
        results: [],
        loading: false,
        selectedIndex: 0,
        debounceTimer: null,

        toggle() {
            if (this.open) {
                this.close();
            } else {
                this.open = true;
                this.$nextTick(() => this.$refs.searchInput?.focus());
            }
        },

        close() {
            this.open = false;
            this.query = '';
            this.results = [];
            this.loading = false;
            this.selectedIndex = 0;
        },

        search() {
            clearTimeout(this.debounceTimer);
            const q = this.query.trim();

            if (q.length < 2) {
                this.results = [];
                this.loading = false;
                return;
            }

            this.loading = true;
            this.debounceTimer = setTimeout(async () => {
                try {
                    const res = await fetch('/api/search?q=' + encodeURIComponent(q));
                    this.results = await res.json();
                } catch (e) {
                    this.results = [];
                } finally {
                    this.loading = false;
                    this.selectedIndex = 0;
                }
            }, 300);
        },

        navigate(url) {
            this.close();
            window.location.href = url;
        },

        onArrowDown() {
            if (this.selectedIndex < this.results.length - 1) {
                this.selectedIndex++;
            }
        },

        onArrowUp() {
            if (this.selectedIndex > 0) {
                this.selectedIndex--;
            }
        },

        onEnter() {
            if (this.results[this.selectedIndex]) {
                this.navigate(this.results[this.selectedIndex].url);
            }
        }
    }"
    @toggle-search.window="toggle()"
    @keydown.ctrl.k.window.prevent="toggle()"
    @keydown.meta.k.window.prevent="toggle()"
    @keydown.escape.window="if (open) { $event.preventDefault(); close(); }"
    @keydown.arrow-down.window="if (open) { $event.preventDefault(); onArrowDown(); }"
    @keydown.arrow-up.window="if (open) { $event.preventDefault(); onArrowUp(); }"
    @keydown.enter.window="if (open && results.length) { $event.preventDefault(); onEnter(); }"
    x-cloak
>
    {{# Backdrop #}}
    <div
        x-show="open"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        class="fixed inset-0 z-[100] bg-black/40 dark:bg-black/60 backdrop-blur-sm"
        @click="close()"
        aria-hidden="true"
    ></div>

    {{# Modal #}}
    <div
        x-show="open"
        x-trap.noscroll="open"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 scale-95 translate-y-4"
        x-transition:enter-end="opacity-100 scale-100 translate-y-0"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100 scale-100 translate-y-0"
        x-transition:leave-end="opacity-0 scale-95 translate-y-4"
        class="fixed inset-0 z-[101] flex items-start justify-center pt-[15vh] px-4 pointer-events-none"
        role="dialog"
        aria-modal="true"
        aria-label="Haku"
    >
        <div class="pointer-events-auto w-full max-w-xl overflow-hidden rounded-2xl border border-neutral-200/70 dark:border-slate-700 bg-white dark:bg-slate-800 shadow-2xl shadow-black/20 ring-1 ring-neutral-900/5 dark:ring-slate-600/20">

            {{# Search input #}}
            <div class="flex items-center gap-3 border-b border-neutral-200/70 dark:border-slate-700 px-5 py-4">
                <svg class="h-5 w-5 shrink-0 text-neutral-400 dark:text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="7"></circle>
                    <path d="M21 21l-4.3-4.3"></path>
                </svg>
                <input
                    x-ref="searchInput"
                    x-model="query"
                    @input="search()"
                    type="text"
                    placeholder="Hae sivustolta..."
                    class="w-full bg-transparent text-base text-neutral-900 dark:text-slate-100 placeholder:text-neutral-400 dark:placeholder:text-slate-500 outline-none"
                    autocomplete="off"
                    spellcheck="false"
                />
                <span
                    x-show="loading"
                    class="shrink-0"
                >
                    <svg class="h-5 w-5 animate-spin text-primary" viewBox="0 0 24 24" fill="none">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </span>
            </div>

            {{# Results #}}
            <div class="max-h-[50vh] overflow-y-auto">

                {{# Results list #}}
                <template x-if="results.length > 0">
                    <ul class="p-2">
                        <template x-for="(result, index) in results" :key="result.url">
                            <li>
                                <button
                                    type="button"
                                    @click="navigate(result.url)"
                                    @mouseenter="selectedIndex = index"
                                    :class="selectedIndex === index
                                        ? 'bg-primary/10 dark:bg-primary/20 text-neutral-900 dark:text-white'
                                        : 'text-neutral-700 dark:text-slate-300 hover:bg-neutral-50 dark:hover:bg-slate-750'"
                                    class="flex w-full items-center gap-3 rounded-xl px-4 py-3 text-left transition-colors"
                                >
                                    <svg class="h-4 w-4 shrink-0 text-neutral-400 dark:text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                                        <polyline points="13 2 13 9 20 9"></polyline>
                                    </svg>

                                    <div class="min-w-0 flex-1">
                                        <span class="block truncate text-sm font-semibold" x-text="result.title"></span>
                                    </div>

                                    <span
                                        class="shrink-0 rounded-md bg-neutral-100 dark:bg-slate-700 px-2 py-0.5 text-[10px] font-semibold uppercase tracking-wider text-neutral-500 dark:text-slate-400"
                                        x-text="result.collection"
                                    ></span>

                                    <svg
                                        x-show="selectedIndex === index"
                                        class="h-4 w-4 shrink-0 text-primary"
                                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                    >
                                        <polyline points="9 18 15 12 9 6"></polyline>
                                    </svg>
                                </button>
                            </li>
                        </template>
                    </ul>
                </template>

                {{# No results #}}
                <template x-if="query.trim().length >= 2 && !loading && results.length === 0">
                    <div class="px-5 py-10 text-center">
                        <svg class="mx-auto h-10 w-10 text-neutral-300 dark:text-slate-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="M21 21l-4.35-4.35"></path>
                            <path d="M8 11h6"></path>
                        </svg>
                        <p class="mt-3 text-sm text-neutral-500 dark:text-slate-400">Ei hakutuloksia</p>
                        <p class="mt-1 text-xs text-neutral-400 dark:text-slate-500">Kokeile toista hakusanaa</p>
                    </div>
                </template>

                {{# Empty state (no query yet) #}}
                <template x-if="query.trim().length < 2 && !loading">
                    <div class="px-5 py-8 text-center">
                        <p class="text-sm text-neutral-400 dark:text-slate-500">Kirjoita hakusana aloittaaksesi</p>
                    </div>
                </template>
            </div>

            {{# Footer #}}
            <div class="flex items-center justify-between border-t border-neutral-200/70 dark:border-slate-700 px-5 py-3">
                <div class="flex items-center gap-3 text-xs text-neutral-400 dark:text-slate-500">
                    <span class="inline-flex items-center gap-1">
                        <kbd class="rounded border border-neutral-300/60 dark:border-slate-600 bg-neutral-100 dark:bg-slate-700 px-1.5 py-0.5 text-[10px] font-semibold">↑↓</kbd>
                        navigoi
                    </span>
                    <span class="inline-flex items-center gap-1">
                        <kbd class="rounded border border-neutral-300/60 dark:border-slate-600 bg-neutral-100 dark:bg-slate-700 px-1.5 py-0.5 text-[10px] font-semibold">↵</kbd>
                        valitse
                    </span>
                </div>
                <span class="inline-flex items-center gap-1 text-xs text-neutral-400 dark:text-slate-500">
                    <kbd class="rounded border border-neutral-300/60 dark:border-slate-600 bg-neutral-100 dark:bg-slate-700 px-1.5 py-0.5 text-[10px] font-semibold">Esc</kbd>
                    sulje
                </span>
            </div>
        </div>
    </div>
</div>
<!-- End: /components/_search.antlers.html -->
