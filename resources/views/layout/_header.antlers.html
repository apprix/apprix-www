<!-- /layout/_header.antlers.html -->
<header
  x-data="{ scrolled: false }"
  x-init="
    const onScroll = () => { scrolled = window.scrollY > 50 };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
  "
  :class="scrolled
    ? 'border-b border-neutral-200/60 bg-white/85 supports-[backdrop-filter]:bg-white/75 shadow-sm backdrop-blur'
    : 'border-b border-transparent bg-transparent supports-[backdrop-filter]:bg-transparent'"
  class="sticky top-0 z-50 transition-all duration-200"
>
  <div class="fluid-grid">
    <div class="span-content">
      <div class="grid grid-cols-[auto_1fr_auto] items-center gap-6 py-2.5 md:py-3">

        {{# Left: Logo #}}
        <div class="w-[160px] shrink-0 md:w-[230px]">
          {{ partial:components/logo }}
        </div>

        {{# Center: Main navigation inside a pill #}}
        <div class="justify-self-center">
          <div
            :class="scrolled
              ? 'bg-white/5 ring-0 rounded-none ring-neutral-900/10 shadow-none'
              : 'bg-white/55 ring-white/30 shadow-none rounded-full ring-1 ring-inset backdrop-blur'"
            class="
              hidden md:flex items-center
              rounded-full

              px-2 py-1
              transition-all duration-200
            "
          >
            {{ partial:navigation/main }}
          </div>
        </div>

        {{# Right: Actions (Language + CTA) #}}
        <div class="justify-self-end hidden gap-2 items-center md:flex">
          {{ partial:navigation/language_switcher }}

          <a
            href="/yritys"
            :class="scrolled
              ? 'bg-primary text-white ring-black/5 shadow-md shadow-black/10 hover:brightness-110'
              : 'bg-white/35 text-neutral-900 ring-white/35 shadow-none hover:bg-white/20'"
            class="
              inline-flex items-center justify-center
              rounded-lg px-7 py-3
              text-sm font-semibold
              ring-1 ring-inset
              backdrop-blur
              transition
              hover:-translate-y-[1px]
              active:translate-y-0
              focus:outline-none focus-visible:ring-2 focus-visible:ring-primary/30 focus-visible:ring-offset-2
            "
          >
            Ota yhteyttä
          </a>
        </div>

      </div>
    </div>
  </div>
</header>
<!-- End: /layout/_header.antlers.html -->
