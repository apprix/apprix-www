{{ if video_type == 'vimeo' && vimeo_id }}
<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:0.75rem;box-shadow:0 1px 2px 0 rgba(0,0,0,.08);margin-top:1rem"><iframe src="https://player.vimeo.com/video/{{ vimeo_id }}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe></div>
{{ elseif video_type == 'mp4' && file }}
<video controls preload="metadata" style="width:100%;border-radius:0.75rem;box-shadow:0 1px 2px 0 rgba(0,0,0,.08);margin-top:1rem">
    <source src="{{ file:url }}" type="video/mp4">
</video>
{{ /if }}
