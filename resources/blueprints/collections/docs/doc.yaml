title: Doc
tabs:
  main:
    display: Sisältö
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              localizable: true
              display: Otsikko
              validate:
                - required
          -
            handle: content
            field:
              type: bard
              localizable: true
              display: Sisältö
              container: files
              save_html: true
              reading_time: true
              allow_source: true
              buttons:
                - h2
                - h3
                - h4
                - bold
                - italic
                - unorderedlist
                - orderedlist
                - quote
                - anchor
                - image
                - removeformat
                - alignleft
                - aligncenter
                - alignright
                - alignjustify
              remove_empty_nodes: false
              sets:
                media:
                  display: Media
                  sets:
                    new_set:
                      display: 'New Set'
                      fields:
                        -
                          import: image
          -
            handle: videos
            field:
              type: replicator
              display: 'Lisää video'
              instructions: 'Lisää videotiedosto (MP4, WebM). Näkyy sisällön lopussa.'
              localizable: true
              collapse: true
              sets:
                mp4:
                  display: Video
                  icon: media-webcam-video
                  fields:
                    -
                      handle: file
                      field:
                        type: assets
                        display: Video-tiedosto
                        container: files
                        max_files: 1
  seo:
    display: SEO
    sections:
      -
        display: Basic
        instructions: 'Basic SEO settings.'
        fields:
          -
            import: 'statamic-peak-seo::seo_basic'
      -
        display: Advanced
        instructions: 'Advanced SEO settings.'
        fields:
          -
            import: 'statamic-peak-seo::seo_advanced'
      -
        display: 'Open Graph'
        instructions: 'Open Graph meta tags for social sharing.'
        fields:
          -
            import: 'statamic-peak-seo::seo_open_graph'
      -
        display: Sitemap
        instructions: 'Sitemap configuration.'
        fields:
          -
            import: 'statamic-peak-seo::seo_sitemap'
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
