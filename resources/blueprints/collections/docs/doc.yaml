title: Doc
tabs:
  main:
    display: Sisältö
    sections:
      -
        fields:
          - handle: title
            field:
              type: text
              required: true
              localizable: true
              display: Otsikko

          - handle: content
            field:
              type: bard
              localizable: true
              display: Sisältö
              container: files
              fullscreen: true
              save_html: true
              toolbar_mode: fixed
              reading_time: true
              allow_source: true
              enable_input_rules: true
              enable_paste_rules: true
              buttons:
                - h2
                - h3
                - bold
                - italic
                - unorderedlist
                - orderedlist
                - quote
                - anchor
                - image
                - removeformat

          - handle: videos
            field:
              type: replicator
              display: 'Lisää video'
              instructions: 'Lisää videotiedosto (MP4, WebM). Näkyy sisällön lopussa.'
              localizable: true
              collapse: true
              sets:
                mp4:
                  display: Video
                  icon: media-webcam-video
                  fields:
                    - handle: file
                      field:
                        type: assets
                        display: Video-tiedosto
                        container: files
                        max_files: 1
  seo:
    display: SEO
    sections:
      -
        display: Basic
        instructions: 'Basic SEO settings.'
        fields:
          -
            import: 'statamic-peak-seo::seo_basic'
      -
        display: Advanced
        instructions: 'Advanced SEO settings.'
        fields:
          -
            import: 'statamic-peak-seo::seo_advanced'
      -
        display: 'Open Graph'
        instructions: 'Open Graph meta tags for social sharing.'
        fields:
          -
            import: 'statamic-peak-seo::seo_open_graph'
      -
        display: Sitemap
        instructions: 'Sitemap configuration.'
        fields:
          -
            import: 'statamic-peak-seo::seo_sitemap'
