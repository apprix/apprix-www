title: FAQ Item
tabs:
  main:
    display: Sisältö
    sections:
      -
        fields:
          - handle: title
            field:
              type: text
              required: true
              localizable: true
              display: Kysymys
              instructions: "The FAQ question."

          - handle: faq_categories
            field:
              type: terms
              taxonomies:
                - faq_categories
              display: Kategoria
              required: true
              localizable: false
              max_items: 1
              mode: select

          - handle: order
            field:
              type: integer
              localizable: false
              display: Järjestys
              instructions: "Order within the category. Lower = first."
              default: 0
              width: 25

          - handle: answer
            field:
              type: bard
              required: true
              localizable: true
              display: Vastaus
              container: files
              save_html: true
              toolbar_mode: fixed
              allow_source: false
              enable_input_rules: true
              enable_paste_rules: true
              buttons:
                - bold
                - italic
                - unorderedlist
                - orderedlist
                - anchor
                - image
                - removeformat
